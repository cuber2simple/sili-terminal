# ================================
# Sili Terminal - Ghostty Config
# ================================

# Theme
theme = Catppuccin Mocha

# Font
font-family = JetBrainsMono Nerd Font Mono
font-size = 14
font-thicken = true
adjust-cell-height = 1

# Window
background-opacity = 0.90
background-blur-radius = 30
macos-titlebar-style = transparent
confirm-close-surface = false
macos-option-as-alt = true
window-padding-x = 6
window-padding-y = 4
window-decoration = true
window-save-state = always

# Quick Terminal - 全局呼出 (Cmd+`)
keybind = global:cmd+grave_accent=toggle_quick_terminal

# Cursor
cursor-style = block
cursor-style-blink = true

# Scrollback
scrollback-limit = 10000

# Mouse - 选中自动复制
copy-on-select = clipboard

# Clipboard
clipboard-read = allow
clipboard-write = allow
clipboard-paste-protection = false

# Shell
shell-integration = detect
shell-integration-features = ssh-env,ssh-terminfo

# Claude Code: tmux 下 Shift+Enter 换行
keybind = shift+enter=text:\x1b\r

# Cmd+N = 新开一个空白 Ghostty 窗口
keybind = cmd+n=new_window

# Cmd+Shift+N = 一键启动 Sili Claude Workspace
# NOTE: new_window 不支持带命令路径参数，暂时注释掉
# 可通过 Quick Terminal 或 alias 手动运行 tmux-claude.sh
# keybind = cmd+shift+n=new_window:/Users/cuber/project/ai/sili-terminal/tmux-claude.sh
