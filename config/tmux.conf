# ================================
# Sili Terminal - tmux Config
# ================================

# --- Prefix: Ctrl+A (避免 Ctrl+B 与 Claude Code 冲突) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 基础设置 ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard:strikethrough:usstyle"
set -g allow-passthrough on
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

# --- 关闭终端时自动清理 session (hook 方式，不影响 detached 创建) ---
set-hook -g client-detached "run-shell 'tmux kill-session -t \"#{hook_session_name}\"'"
set -g escape-time 0
set -g focus-events on
set -g status-position top

# --- Claude Code 关键设置 ---
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'
set -g set-clipboard on

# --- Vim 式窗格导航 ---
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Alt+hjkl 免 prefix 直接切窗格
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# --- Vim 式窗格调整大小 ---
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 3
bind -r J resize-pane -D 3

# --- Sili Popups (Alt 快捷键, 免 prefix) ---
# Alt-s: 文件搜索 (fzf + bat preview, Esc/q 关闭)
bind -n M-s display-popup -E -w85% -h85% -d "#{pane_current_path}" "bash $HOME/project/ai/sili-terminal/sili-file-search.sh #{pane_current_path}"

# Alt-d: 临时终端 (再按 Alt-d 关闭)
bind -n M-d display-popup -w80% -h80% -d "#{pane_current_path}" -T " Terminal "

# Alt-q: 退出当前 session
bind -n M-q kill-session

# --- 分屏 (直觉化) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- 新窗口保持当前路径 ---
bind c new-window -c "#{pane_current_path}"

# --- 快速操作 ---
bind x kill-pane
bind X kill-window
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- 复制模式 (vi 风格) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- 插件 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# --- Catppuccin 配置 ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# --- Resurrect & Continuum (手动保存/恢复, 不自动恢复) ---
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '0'

# --- 初始化 TPM (必须放最后) ---
run '~/.tmux/plugins/tpm/tpm'
